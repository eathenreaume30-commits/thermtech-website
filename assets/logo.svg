<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="Therm Tech Heating and Cooling">
  <defs>
    <linearGradient id="ttRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8242B"/><stop offset="1" stop-color="#A60000"/>
    </linearGradient>
    <linearGradient id="ttBlue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2B6CB0"/><stop offset="1" stop-color="#0B2F4F"/>
    </linearGradient>
  </defs>
  <!-- modern flat swirl badge -->
  <g transform="translate(32,32)">
    <circle r="28" fill="#021D38"/>
    <!-- red half (top) sweeping into a comma -->
    <path d="M0,-22 A22,22 0 0,1 0,22 A11,11 0 0,1 0,0 A11,11 0 0,0 0,-22 Z" fill="url(#ttRed)"/>
    <!-- blue half (bottom) sweeping into a comma -->
    <path d="M0,22 A22,22 0 0,1 0,-22 A11,11 0 0,1 0,0 A11,11 0 0,0 0,22 Z" fill="url(#ttBlue)"/>
    <circle cx="0" cy="-11" r="4.2" fill="#fff"/>
    <circle cx="0" cy="11" r="4.2" fill="#fff"/>
  </g>
  <!-- wordmark -->
  <text x="72" y="34" font-family="'Bricolage Grotesque','Segoe UI',sans-serif" font-weight="800" font-size="29" letter-spacing="-1">
    <tspan fill="#CE0000">Therm</tspan><tspan fill="#0B2F4F"> Tech</tspan>
  </text>
  <text x="74" y="50" font-family="'Space Grotesk','Inter',sans-serif" font-weight="600" font-size="9.5" letter-spacing="5" fill="#2B6CB0">HEATING &amp; COOLING</text>
</svg>
